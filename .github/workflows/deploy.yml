name: Infrastructure Deployment

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - deploy
    paths:
      - "terraform/**"
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_mongo_url: ${{ secrets.MONGO_URL }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_better_stack_token: ${{ secrets.BETTER_STACK_TOKEN }}
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Import Existing Resources
        working-directory: ./terraform
        run: |
          terraform import google_service_account.server_sa \
            projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/filego-server-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com || true

          terraform import google_compute_address.server_ip \
            projects/${{ secrets.GCP_PROJECT_ID }}/regions/asia-south1/addresses/filego-server-ip || true

          for s in MONGO_URL JWT_SECRET JWT_REFRESH_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY BETTER_STACK_TOKEN; do
            terraform import "google_secret_manager_secret.filego_secrets[\"$s\"]" \
            "projects/${{ secrets.GCP_PROJECT_ID }}/secrets/$s" || true
          done

      - name: Terraform Plan
        run: terraform plan -input=false
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy'
        run: terraform apply -auto-approve -input=false
        working-directory: ./terraform
