name: Production Release

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - "terraform/**"
      - "server/**"
      - "client/**"
      - "nginx/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  terraform:
    name: Infrastructure (Terraform)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_mongo_url: ${{ secrets.MONGO_URL }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_better_stack_token: ${{ secrets.BETTER_STACK_TOKEN }}
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/deploy'
        run: terraform apply -auto-approve -input=false

      - name: Terraform Plan (Dry Run)
        if: github.ref == 'refs/heads/main'
        run: terraform plan -input=false

  docker:
    name: Build & Push Images
    needs: terraform
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/filego-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx (with client)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/filego-nginx:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sync-secrets:
    name: Sync Secrets to GCP
    needs: terraform
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync Secrets to GCP
        run: |
          secrets=(
            "MONGO_URL"
            "JWT_SECRET"
            "JWT_REFRESH_SECRET"
            "AWS_ACCESS_KEY_ID"
            "AWS_SECRET_ACCESS_KEY"
            "GOOGLE_CLIENT_ID"
            "GOOGLE_CLIENT_SECRET"
            "BETTER_STACK_SOURCE_TOKEN"
            "BETTER_STACK_UPTIME_URL"
          )

          for secret in "${secrets[@]}"; do
            value="${!secret}"
            if [ -n "$value" ]; then
              if gcloud secrets versions describe latest --secret="$secret" >/dev/null 2>&1; then
                current_value=$(gcloud secrets versions access latest --secret="$secret")
                if [ "$value" == "$current_value" ]; then
                  echo "$secret is already up to date. Skipping."
                  continue
                fi
              fi
              echo -n "$value" | gcloud secrets versions add "$secret" --data-file=-
              echo "Successfully synced new version of $secret to GCP"
            else
              echo "Error: $secret is empty in GitHub Secrets. Skipping."
            fi
          done
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BETTER_STACK_SOURCE_TOKEN: ${{ secrets.BETTER_STACK_TOKEN }}
          BETTER_STACK_UPTIME_URL: ${{ secrets.BETTER_STACK_UPTIME_URL }}

  deploy-app:
    name: Update Production VM
    needs: [docker, sync-secrets]
    if: github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: SSH and Update
        run: |
          gcloud compute ssh filego-server-vm \
            --zone=asia-south1-a \
            --command="cd /opt/filego && sudo git fetch origin deploy && sudo git reset --hard origin/deploy && sudo docker compose pull && sudo docker compose up -d"
