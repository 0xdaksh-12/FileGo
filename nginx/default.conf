server {
    listen 80;
    server_name localhost;

    # Log to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    # API Proxy 
    # No trailing slash on proxy_pass → nginx forwards the full URI unchanged.
    # /api/files/upload-url → http://server:3000/api/files/upload-url ✓
    # Fixes CRIT-1 (prefix stripping) and CRIT-2 (localhost vs service name).
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static SPA
    location / {
        root  /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.amazonaws.com https://accounts.google.com https://in.logtail.com;" always;
        add_header X-Frame-Options          "DENY"                               always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
