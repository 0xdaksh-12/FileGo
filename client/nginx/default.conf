server {
    listen 80;
    server_name localhost;

    # Log to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # CSP: Allowed sources for FileGo (AWS, Google OAuth, Better Stack, Google Fonts)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:3000 https://*.amazonaws.com https://accounts.google.com https://in.logtail.com;" always;
        
        # Additional Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
