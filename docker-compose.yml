services:
  server:
    image: 0xdaksh12/filego-server:latest
    container_name: filego-server
    # Not exposed externally — nginx proxies /api/* to this service internally.
    env_file:
      - ./server/.env
    restart: unless-stopped

  nginx:
    image: 0xdaksh12/filego-nginx:latest
    container_name: filego-nginx
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
