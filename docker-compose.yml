services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: filego-server
    # Not exposed externally — nginx proxies /api/* to this service internally.
    env_file:
      - ./server/.env
    restart: unless-stopped

  nginx:
    build:
      # Context is project root so the Dockerfile can access both client/ and nginx/
      context: ./
      dockerfile: nginx/Dockerfile
      args:
        # VITE_API_URL is baked into the static bundle at build time
        - VITE_API_URL=/api
    container_name: filego-nginx
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
